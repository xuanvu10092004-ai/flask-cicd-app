# Tên workflow
name: Flask CI/CD Pipeline

# Trigger workflow
on:
  push:
    branches:
      - main

# Danh sách jobs
jobs:

  # JOB 1: Build và test
  test-build:

    # Chạy trên Ubuntu VM
    runs-on: ubuntu-latest

    steps:

      # Bước 1: Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Bước 2: Cài Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Bước 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Bước 4: Run tests
      - name: Run tests
        run: |
          pytest

      # Bước 5: Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 6: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-cicd-app:latest .

      # Bước 7: Push image lên Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-cicd-app:latest

  
